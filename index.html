<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles/index.css"> 
</head>
<body>

    <div class="main-container colorback">

        <div class="main-screen screentext tytext" id="screen1"> </div>
        <div class="result-screen screentext tytext" id="screen2"> </div>
    

        <div class="btn-container">
            <button class="btn color2" onclick="handleClick('CE')">CE
            </button>
            <button class="btn color2" onclick="handleClick('^')">^
            </button>
            <button class="btn color2" onclick="handleClick('√')">√
            </button>
            <button class="btn color3" onclick="handleClick('/')">/</button>
        </div>

        <div class="btn-container">
            <button class="btn" onclick="handleClick(7)">7</button>
            <button class="btn" onclick="handleClick(8)">8</button>
            <button class="btn" onclick="handleClick(9)">9</button>
            <button class="btn color3" onclick="handleClick('x')">x</button>
        </div>

        <div class="btn-container">
            <button class="btn" onclick="handleClick(4)">4</button>
            <button class="btn" onclick="handleClick(5)">5</button>
            <button class="btn" onclick="handleClick(6)">6</button>
            <button class="btn color3" onclick="handleClick('-')">-</button>
        </div>

        <div class="btn-container">
            <button class="btn" onclick="handleClick(1)">1</button>
            <button class="btn" onclick="handleClick(2)">2</button>
            <button class="btn" onclick="handleClick(3)">3</button>
            <button class="btn color3" onclick="handleClick('+')">+</button>
        </div>

        <div class="btn-container">
            <button class="btn2" onclick="handleClick('0')">0</button> 
            <button class="btn" onclick="handleClick('.')">.</button>
            <button class="btn color" onclick="calculate()">=
            </button> 
        </div>

    </div>

    <div class="result-container color">
        <div class="prev-screen screentext tytext" id="screen3"> </div>  
    </div>

    <script src="script.js"></script>
</body>
</html>
