<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles/index.css"> 
</head>
<body>
    <div class="mega-container">
            <h1 class="tytext"> <b>THE <br>CALCULATOR </h1></b>
            <div class="main-container colorback">

                <div class="main-screen screentext tytext" id="screen1"> </div>
                <div class="result-screen screentext tytext" id="screen2"> </div>
        

                <div class="btn-container">
                    <button class="btn color2 tytext" style="font-weight: bold" onclick="handleClick('CE')">CE
                    </button>
                    <button class="btn color2 tytext" style="font-weight: bold" onclick="handleClick('<')"><
                    </button>
                    <button class="btn color2 tytext" style="font-weight: bold" onclick="handleClick('^')">^
                    </button>
                    <button class="btn color3 tytext" style="font-weight: bold" onclick="handleClick('/')">/</button>
                </div>

                <div class="btn-container">
                    <button class="btn tytext" onclick="handleClick(7)">7</button>
                    <button class="btn tytext" onclick="handleClick(8)">8</button>
                    <button class="btn tytext" onclick="handleClick(9)">9</button>
                    <button class="btn color3 tytext" style="font-weight: bold"  onclick="handleClick('x')">x</button>
                </div>

                <div class="btn-container">
                    <button class="btn tytext" onclick="handleClick(4)">4</button>
                    <button class="btn tytext" onclick="handleClick(5)">5</button>
                    <button class="btn tytext" onclick="handleClick(6)">6</button>
                    <button class="btn color3 tytext" style="font-weight: bold" onclick="handleClick('-')">-</button>
                </div>

                <div class="btn-container">
                    <button class="btn tytext" onclick="handleClick(1)">1</button>
                    <button class="btn tytext" onclick="handleClick(2)">2</button>
                    <button class="btn tytext" onclick="handleClick(3)">3</button>
                    <button class="btn color3 tytext" style="font-weight: bold" onclick="handleClick('+')">+</button>
                </div>

                <div class="btn-container">
                    <button class="btn2 tytext" onclick="handleClick('0')">0</button> 
                    <button class="btn tytext" onclick="handleClick('.')">.</button>
                    <button class="btn color tytext" style="font-weight: bold" onclick="calculate()">=
                    </button> 
                </div>

        </div>

        <div class="result-container">
            <h1 class="tytext">HISTORY...</h1>
            <div class="prev-screen screentext tytext" id="screen3"> </div> 
            <div class="btnPrev-container">
                <button class="btn tytext" style=background:#E6E6E6; onclick="handleClick2('Clear All') ">Clear All</button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
